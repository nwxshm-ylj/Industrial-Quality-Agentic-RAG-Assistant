pr_rules:
  wheel_type:
    PR001:
      name: "18寸铝合金轮毂"
      part: "wheel"
      description: "适用于基础配置车型的18寸铝合金轮毂。"
    PR002:
      name: "19寸黑色运动轮毂"
      part: "wheel"
      description: "适用于运动外观配置车型。"
    PR003:
      name: "20寸高性能轮毂"
      part: "wheel"
      description: "适用于高性能或高配车型。"

  mirror_type:
    PR101:
      name: "传统外后视镜"
      part: "mirror"
      description: "车辆配置传统外后视镜。"
    PR102:
      name: "数字外后视镜"
      part: "mirror"
      description: "车辆配置数字外后视镜。"

fault_rules:
  wheel_misrecognition:
    name: "轮毂识别异常排查规则"
    keywords:
      - "轮毂"
      - "误识别"
      - "识别异常"
      - "AI视觉"
      - "PR配置"
    possible_causes:
      - "相机曝光异常，导致轮毂边缘特征不清晰。"
      - "光源角度偏移，导致反光或阴影。"
      - "PR配置规则未及时更新。"
      - "模型版本与当前车型配置不匹配。"
      - "触发位置偏移，导致采集区域不完整。"
    check_steps:
      - "检查相机曝光、增益和焦距参数。"
      - "检查光源亮度、安装角度和反光情况。"
      - "核对MES配置和PR规则映射。"
      - "查看最近模型版本更新时间。"
      - "检查车辆触发位置是否稳定。"
    action:
      - "必要时重新采集样本并更新模型。"
      - "若规则错误，应先修正PR映射后重新验证。"

  ocr_vin_failure:
    name: "合格证VIN字段OCR识别失败规则"
    keywords:
      - "OCR"
      - "VIN"
      - "合格证"
      - "字段识别"
      - "识别失败"
    possible_causes:
      - "证书打印位置偏移。"
      - "字体颜色过浅或打印质量差。"
      - "图像采集区域配置错误。"
      - "OCR模板未及时更新。"
      - "条码绑定信息与证书信息不一致。"
    check_steps:
      - "检查证书打印质量。"
      - "检查OCR采集图像是否清晰。"
      - "核对VIN字段坐标区域。"
      - "更新OCR识别模板。"
      - "重新比对条码与VIN绑定关系。"
    action:
      - "对失败样本进行复核并加入模板验证集。"
      - "对频繁失败字段进行规则化校验。"

  torque_alarm:
    name: "扭矩连续报警排查规则"
    keywords:
      - "扭矩"
      - "报警"
      - "拧紧"
      - "工位"
      - "连续报警"
    possible_causes:
      - "拧紧枪标定异常。"
      - "套筒磨损。"
      - "螺栓来料批次异常。"
      - "工位程序号调用错误。"
      - "网络中断导致数据上传失败。"
    check_steps:
      - "检查拧紧枪状态。"
      - "检查套筒磨损情况。"
      - "查看最近报警代码。"
      - "核对工位程序号。"
      - "查询历史报警记录。"
    action:
      - "如连续报警，应暂停放行并进行设备点检。"
      - "若程序号异常，应复核车型与工艺参数匹配关系。"