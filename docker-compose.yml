
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: industrial-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: industrial-rag-postgres
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: industrial_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: industrial-rag-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    image: 2-industrial-rag-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrial-rag-api
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_started
      opensearch:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: industrial_docs_qwen_1024_v1
      QDRANT_COLLECTION_ALIAS: industrial_docs_active
      EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      EMBEDDING_PROVIDER: qwen
      QWEN_EMBEDDING_MODEL: text-embedding-v4
      QWEN_EMBEDDING_DIMENSION: "1024"
      QWEN_EMBEDDING_API_KEY: ${QWEN_EMBEDDING_API_KEY}
      QWEN_EMBEDDING_BASE_URL: ${QWEN_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding}
      EMBEDDING_INDEX_VERSION: qwen-1024-v1

      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_PREFIX: ${OPENSEARCH_INDEX_PREFIX:-industrial_docs}
      KEYWORD_SEARCH_BACKEND: opensearch
      KEYWORD_INDEX_VERSION: v1
      HYBRID_DEGRADED_MODE: vector_only

      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}

      DATABASE_URL: postgresql+psycopg2://rag_user:rag_password@postgres:5432/industrial_rag

      RERANKER_MODEL: BAAI/bge-reranker-base
      USE_RERANKER: "false"
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  streamlit:
    image: 2-industrial-rag-api:latest
    container_name: industrial-rag-streamlit
    depends_on:
      - api
    ports:
      - "30000:8501"
    environment:
      RAG_API_URL: http://api:8000/api/v1/graph-chat
    volumes:
      - ./data:/app/data
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0

  init-sql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrial-rag-init-sql
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://rag_user:rag_password@postgres:5432/industrial_rag
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: industrial_docs
      EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      USE_RERANKER: "false"
    volumes:
      - ./data:/app/data
    command: python -m scripts.init_sql_data
    profiles:
      - tools

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrial-rag-ingest
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      LEGACY_QDRANT_COLLECTION: industrial_docs
      EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      DATABASE_URL: postgresql+psycopg2://rag_user:rag_password@postgres:5432/industrial_rag
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      USE_RERANKER: "false"
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    command: python -m scripts.ingest_docs
    profiles:
      - tools

volumes:
  qdrant_data:
  postgres_data:
  opensearch_data:
  hf_cache:
