apiVersion: 1

datasources:
  - name: Prometheus
    uid: industrial-rag-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: industrial-rag-loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          datasourceUid: industrial-rag-tempo
          url: '$${__value.raw}'

  - name: Tempo
    uid: industrial-rag-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: industrial-rag-loki
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
        filterByTraceID: true

  - name: Industrial RAG PostgreSQL
    uid: industrial-rag-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: rag_user
    database: industrial_rag
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $POSTGRES_PASSWORD

