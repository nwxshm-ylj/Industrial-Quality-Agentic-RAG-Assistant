groups:
  - name: industrial-rag-api
    rules:
      - alert: IndustrialRagHighErrorRate
        expr: |
          sum(rate(industrial_rag_http_requests_total{status_class="5xx"}[5m]))
          /
          clamp_min(sum(rate(industrial_rag_http_requests_total[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Industrial RAG API 5xx rate is above 5%

      - alert: IndustrialRagHighGraphLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(industrial_rag_graph_duration_seconds_bucket[5m])) by (le)
          ) > 15
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Industrial RAG graph p95 latency is above 15 seconds

      - alert: IndustrialRagRetrievalDegraded
        expr: |
          sum(rate(industrial_rag_retrieval_degraded_total[10m]))
          /
          clamp_min(
            sum(rate(industrial_rag_retrieval_requests_total[10m])),
            0.001
          ) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: More than 20% of retrieval requests are degraded

      - alert: IndustrialRagUsagePersistenceFailure
        expr: increase(industrial_rag_usage_persist_failures_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Usage analytics persistence is failing

